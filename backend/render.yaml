services:
  - type: web
    name: restaurant-finder-backend
    runtime: php
    buildCommand: |
      composer install --no-interaction --prefer-dist --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: restaurant-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: restaurant-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: restaurant-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: restaurant-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: restaurant-db
          property: password
      - key: SESSION_DOMAIN
        value: .onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false

  - type: pgbouncer
    name: restaurant-db-pgbouncer
    databaseName: restaurant-db
    envVars:
      - key: POOL_MODE
        value: transaction

databases:
  - name: restaurant-db
    databaseName: restaurant_finder
    user: restaurant_user
    plan: free